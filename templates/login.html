<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>INSIDEX — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#06060a;--s1:#0e0e18;--border:#1e1e35;--text:#e8e8f0;--muted:#6a6a8a;--purple:#8b5cf6;--purple3:#a78bfa;--cyan:#22d3ee;--red:#f43f5e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 60% at 20% 20%,rgba(139,92,246,.09),transparent),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(34,211,238,.05),transparent),
    linear-gradient(rgba(139,92,246,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(139,92,246,.012) 1px,transparent 1px);
  background-size:auto,auto,44px 44px,44px 44px}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:0 20px;animation:fadeUp .4s ease both}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--purple),var(--cyan));
  border-radius:16px;display:inline-flex;align-items:center;justify-content:center;
  font-size:26px;margin-bottom:14px}
.logo-name{font-family:'Syne',sans-serif;font-weight:900;font-size:22px;
  background:linear-gradient(135deg,var(--purple3),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:var(--muted);margin-top:4px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:7px}
.field input{width:100%;background:#07070e;border:1.5px solid var(--border);border-radius:10px;
  padding:12px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:.2s}
.field input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,.12)}
.field input::placeholder{color:var(--muted)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--purple),#6d28d9);
  color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:8px;
  padding:10px 14px;font-size:12px;color:var(--red);margin-top:14px;display:none}
.warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:8px;
  padding:10px 14px;font-size:11px;color:#fcd34d;margin-bottom:18px;display:none;line-height:1.5}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-wrap">
    <div class="logo-icon">💰</div>
    <div class="logo-name">INSIDEX</div>
    <div class="logo-sub">Accounting System · Admin Only</div>
  </div>
  <div class="card">
    <div class="warn" id="warn-no-pw">
      ⚠️ ยังไม่ได้ตั้ง <strong>ADMIN_PASSWORD</strong> ใน Railway<br/>
      ไปที่ Railway → Variables → เพิ่ม ADMIN_PASSWORD แล้ว Redeploy
    </div>
    <div class="field">
      <label>ชื่อผู้ใช้</label>
      <input type="text" id="inp-user" placeholder="admin" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()"/>
    </div>
    <div class="field">
      <label>รหัสผ่าน</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn" id="btn" onclick="doLogin()">🔐 เข้าสู่ระบบ</button>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
async function init(){
  const me=await fetch('/api/auth/me').then(r=>r.json());
  if(me.logged_in){window.location.href='/';return;}
  if(me.no_password){
    document.getElementById('warn-no-pw').style.display='block';
    document.getElementById('btn').disabled=true;
  } else {
    document.getElementById('inp-user').focus();
  }
}

async function doLogin(){
  const user=document.getElementById('inp-user').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  if(!user||!pass){err.textContent='กรุณาใส่ชื่อผู้ใช้และรหัสผ่าน';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='⏳ กำลังเข้าสู่ระบบ...';
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:user,password:pass})});
  const d=await r.json();
  btn.disabled=false;btn.textContent='🔐 เข้าสู่ระบบ';
  if(d.success){window.location.href='/';}
  else{err.textContent=d.error||'เข้าสู่ระบบไม่ได้';err.style.display='block';}
}
init();
</script>
</body>
</html>
