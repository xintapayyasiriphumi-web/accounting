<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>INSIDEX — Accounting</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#06060a;--s1:#0e0e18;--s2:#13131f;--s3:#18182a;
  --border:#1e1e35;--border2:#2a2a45;
  --text:#e8e8f0;--muted:#6a6a8a;--muted2:#4a4a6a;
  --purple:#8b5cf6;--purple2:#6d28d9;--purple3:#a78bfa;
  --cyan:#22d3ee;--green:#10b981;--red:#f43f5e;--gold:#f59e0b;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}

/* BG grid */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 5% 0%,rgba(139,92,246,.07),transparent),
    radial-gradient(ellipse 50% 40% at 95% 100%,rgba(34,211,238,.04),transparent),
    linear-gradient(rgba(139,92,246,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(139,92,246,.012) 1px,transparent 1px);
  background-size:auto,auto,44px 44px,44px 44px}

.wrap{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:28px 20px}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:rgba(14,14,24,.85);border:1px solid var(--border);
  border-radius:var(--r-xl);backdrop-filter:blur(16px);margin-bottom:32px;
  animation:fadeUp .35s ease both}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--purple),var(--cyan));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-name{font-family:'Syne',sans-serif;font-weight:900;font-size:14px;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--purple3),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-sub{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:10px}
.month-pick{padding:7px 12px;background:var(--s2);border:1px solid var(--border);
  border-radius:100px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:11px;outline:none;cursor:pointer;transition:.2s}
.month-pick:focus{border-color:var(--purple)}
.btn-export{padding:7px 16px;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.3);
  border-radius:100px;color:var(--cyan);font-size:11px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:.2s;white-space:nowrap}
.btn-export:hover{background:rgba(34,211,238,.2)}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;animation:fadeUp .35s ease .05s both}
@media(max-width:700px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);
  padding:18px;position:relative;overflow:hidden;transition:.2s}
.stat:hover{border-color:var(--purple);transform:translateY(-2px)}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.stat.g::after{background:var(--green)} .stat.p::after{background:var(--purple)}
.stat.c::after{background:var(--cyan)}  .stat.o::after{background:var(--gold)}
.stat-icon{font-size:20px;margin-bottom:10px;display:block}
.stat-label{font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:4px}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.stat-sub{font-size:10px;color:var(--muted);margin-top:4px}
.cg{color:var(--green)}.cp{color:var(--purple)}.cc{color:var(--cyan)}.co{color:var(--gold)}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:420px 1fr;gap:20px;margin-bottom:24px}
@media(max-width:1000px){.main-grid{grid-template-columns:1fr}}

/* PANEL */
.panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;animation:fadeUp .35s ease .08s both}
.panel-hd{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(139,92,246,.025)}
.panel-title{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700}
.panel-body{padding:18px}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:9px;letter-spacing:.12em;color:var(--muted);
  text-transform:uppercase;margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{
  width:100%;background:#07070e;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:12px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--purple)}
.field select option{background:#0e0e18}
.field textarea{resize:vertical;min-height:60px}

/* Product cards */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.prod-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 12px;cursor:pointer;transition:.15s;position:relative}
.prod-card:hover{border-color:var(--purple2)}
.prod-card.active{border-color:var(--purple);background:rgba(139,92,246,.1)}
.prod-card.active::after{content:'✓';position:absolute;top:6px;right:8px;
  font-size:10px;color:var(--purple);font-weight:700}
.prod-name{font-size:11px;font-weight:600;margin-bottom:2px}
.prod-price{font-size:10px;color:var(--gold);font-weight:700}

/* Actual price row */
.price-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:14px}
.price-row .field{flex:1;margin:0}
.price-badge{padding:9px 12px;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-sm);font-size:11px;color:var(--muted);white-space:nowrap;height:40px;
  display:flex;align-items:center;gap:4px}
.disc-val{color:var(--red);font-weight:700}

.btn-add{width:100%;padding:12px;border:none;border-radius:var(--r-sm);
  background:linear-gradient(135deg,var(--green),#059669);color:#fff;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.btn-add:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 14px rgba(16,185,129,.3)}
.btn-add:disabled{opacity:.5;cursor:not-allowed;transform:none}

.result-flash{margin-top:10px;padding:10px 12px;border-radius:var(--r-sm);
  font-size:12px;display:none;animation:fadeIn .2s}
.rf-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.rf-err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:var(--red)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:11px 14px;font-size:9px;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border);
  background:rgba(139,92,246,.02);white-space:nowrap;font-weight:600}
td{padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(30,30,53,.4);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(139,92,246,.025)}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;
  font-size:10px;font-weight:700;white-space:nowrap}
.tg{background:rgba(16,185,129,.15);color:#6ee7b7}
.tp{background:rgba(139,92,246,.15);color:#c4b5fd}
.to{background:rgba(245,158,11,.15);color:#fcd34d}
.tr{background:rgba(244,63,94,.15);color:#fda4af}
.tc{background:rgba(34,211,238,.15);color:#67e8f9}

.pg-row{padding:12px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(139,92,246,.015)}
.pg-info{font-size:11px;color:var(--muted)}
.pg-btns{display:flex;gap:6px}
.pg-btn{padding:6px 14px;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-sm);color:var(--text);font-size:11px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:.2s}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}

/* CHART */
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px;animation:fadeUp .35s ease .12s both}
@media(max-width:800px){.chart-row{grid-template-columns:1fr}}
.chart-box{height:200px;position:relative}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-bar input{flex:1;padding:8px 13px;background:#07070e;border:1px solid var(--border);
  border-radius:var(--r-sm);color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:11px;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--purple)}

/* Edit inline */
.edit-inp{width:90px;padding:4px 8px;background:#07070e;border:1px solid var(--purple);
  border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none}

/* empty */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:12px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="wrap">

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <div class="nav-logo">💰</div>
    <div>
      <div class="nav-name">INSIDEX ACCOUNTING</div>
      <div class="nav-sub">ระบบบัญชีร้าน</div>
    </div>
  </div>
  <div class="nav-right">
    <input type="month" id="monthPick" class="month-pick" title="กรองตามเดือน"/>
    <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
  </div>
</nav>

<!-- STATS -->
<div class="stats-row">
  <div class="stat g"><span class="stat-icon">💵</span>
    <div class="stat-label">วันนี้</div>
    <div class="stat-val cg" id="s-today-rev">—</div>
    <div class="stat-sub" id="s-today-cnt">0 รายการ</div>
  </div>
  <div class="stat p"><span class="stat-icon">📅</span>
    <div class="stat-label">เดือนนี้</div>
    <div class="stat-val cp" id="s-month-rev">—</div>
    <div class="stat-sub" id="s-month-cnt">0 รายการ</div>
  </div>
  <div class="stat c"><span class="stat-icon">🏦</span>
    <div class="stat-label">รวมทั้งหมด</div>
    <div class="stat-val cc" id="s-total-rev">—</div>
    <div class="stat-sub" id="s-total-cnt">0 รายการ</div>
  </div>
  <div class="stat o"><span class="stat-icon">🎁</span>
    <div class="stat-label">ส่วนลดรวม</div>
    <div class="stat-val co" id="s-discount">—</div>
    <div class="stat-sub">ทั้งหมด</div>
  </div>
</div>

<!-- CHARTS -->
<div class="chart-row">
  <div class="panel">
    <div class="panel-hd"><span class="panel-title">📈 รายได้ 30 วันย้อนหลัง</span></div>
    <div class="panel-body"><div class="chart-box"><canvas id="lineChart"></canvas></div></div>
  </div>
  <div class="panel">
    <div class="panel-hd"><span class="panel-title">🍩 สัดส่วนสินค้า</span></div>
    <div class="panel-body"><div class="chart-box"><canvas id="donutChart"></canvas></div></div>
  </div>
</div>

<!-- MAIN GRID -->
<div class="main-grid">

  <!-- ADD FORM -->
  <div class="panel" style="animation-delay:.1s">
    <div class="panel-hd"><span class="panel-title">➕ บันทึกรายการขาย</span></div>
    <div class="panel-body">

      <div class="field"><label>ชื่อลูกค้า (Discord)</label>
        <input type="text" id="f-customer" placeholder="เช่น shxcry" autocomplete="off"/>
      </div>

      <div style="font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:8px">เลือกสินค้า</div>
      <div class="prod-grid" id="prod-grid"></div>

      <div class="price-row">
        <div class="field"><label>ราคาจริงที่รับมา (บาท)</label>
          <input type="number" id="f-price" placeholder="0" min="0" step="1" oninput="updateDiscount()"/>
        </div>
        <div class="price-badge">ลด <span id="f-disc" class="disc-val">0</span> ฿</div>
      </div>

      <div class="field"><label>ช่องทางรับเงิน</label>
        <select id="f-method">
          <option value="bank">🏦 โอนธนาคาร</option>
          <option value="truemoney">💚 TrueMoney</option>
          <option value="other">📦 อื่นๆ</option>
        </select>
      </div>

      <div class="field"><label>หมายเหตุ (ไม่บังคับ)</label>
        <input type="text" id="f-note" placeholder="เช่น ลูกค้าประจำ, ปรับรอบ"/>
      </div>

      <button class="btn-add" id="btn-add" onclick="addTx()">💾 บันทึกการขาย</button>
      <div class="result-flash" id="f-result"></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="panel" style="animation-delay:.12s">
    <div class="panel-hd">
      <span class="panel-title">📋 รายการทั้งหมด</span>
      <span id="tbl-count" style="font-size:10px;color:var(--muted)">0 รายการ</span>
    </div>
    <div class="panel-body" style="padding:14px">
      <div class="search-bar">
        <input type="text" id="tbl-search" placeholder="🔍 ค้นหาชื่อลูกค้า / สินค้า..." oninput="onSearch()"/>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>วันที่</th><th>ลูกค้า</th><th>สินค้า</th>
            <th>ปกติ</th><th>จริง</th><th>ลด</th>
            <th>ช่องทาง</th><th>หมายเหตุ</th><th></th>
          </tr></thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
      <div class="pg-row">
        <span class="pg-info" id="pg-info">หน้า 1/1</span>
        <div class="pg-btns">
          <button class="pg-btn" id="pg-prev" onclick="prevPage()">◀</button>
          <button class="pg-btn" id="pg-next" onclick="nextPage()">▶</button>
        </div>
      </div>
    </div>
  </div>

</div>
</div><!-- /wrap -->

<script>
Chart.defaults.color = '#6a6a8a';
Chart.defaults.font.family = "'JetBrains Mono',monospace";
Chart.defaults.font.size = 10;

let products = [];
let selProduct = null;
let currentPage = 1;
const PER_PAGE = 15;
let searchQ = '';
let filterMonth = '';
let lineChart, donutChart;

const METHOD = { bank:'🏦 โอน', truemoney:'💚 True', other:'📦 อื่นๆ' };

// ── Init ──────────────────────────────────────
async function init() {
  const r = await fetch('/api/products');
  products = await r.json();
  renderProdGrid();

  const m = document.getElementById('monthPick');
  const now = new Date();
  m.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  m.addEventListener('change', () => { filterMonth = m.value; currentPage=1; loadTable(); });
  filterMonth = m.value;

  await loadDashboard();
  await loadTable();
}

// ── Product grid ─────────────────────────────
function renderProdGrid() {
  const g = document.getElementById('prod-grid');
  g.innerHTML = products.map(p => `
    <div class="prod-card" id="pc-${p.key}" onclick="selectProd('${p.key}')">
      <div class="prod-name">${p.name}</div>
      <div class="prod-price">${p.price.toLocaleString()}.-</div>
    </div>`).join('');
}

function selectProd(key) {
  selProduct = products.find(p => p.key === key);
  document.querySelectorAll('.prod-card').forEach(c => c.classList.remove('active'));
  document.getElementById('pc-'+key).classList.add('active');
  document.getElementById('f-price').value = selProduct.price;
  updateDiscount();
}

function updateDiscount() {
  const price = parseInt(document.getElementById('f-price').value) || 0;
  const list  = selProduct ? selProduct.price : 0;
  const disc  = Math.max(0, list - price);
  document.getElementById('f-disc').textContent = disc.toLocaleString();
}

// ── Add ───────────────────────────────────────
async function addTx() {
  const cust  = document.getElementById('f-customer').value.trim();
  const price = parseInt(document.getElementById('f-price').value) || 0;
  const method= document.getElementById('f-method').value;
  const note  = document.getElementById('f-note').value.trim();
  const box   = document.getElementById('f-result');
  const btn   = document.getElementById('btn-add');

  if (!cust)       { flash(box,'❌ กรุณาใส่ชื่อลูกค้า','err'); return; }
  if (!selProduct) { flash(box,'❌ กรุณาเลือกสินค้า','err'); return; }
  if (price <= 0)  { flash(box,'❌ กรุณาใส่ราคา','err'); return; }

  btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
  const r = await fetch('/api/transactions', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ customer:cust, product_key:selProduct.key, actual_price:price, method, note })
  });
  const d = await r.json();
  btn.disabled = false; btn.textContent = '💾 บันทึกการขาย';

  if (d.success) {
    flash(box, `✅ บันทึก ${selProduct.name} ${price.toLocaleString()} ฿ แล้ว`, 'ok');
    document.getElementById('f-customer').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-price').value = selProduct.price;
    updateDiscount();
    currentPage = 1;
    await loadDashboard();
    await loadTable();
  } else {
    flash(box, '❌ ' + d.error, 'err');
  }
}

function flash(box, msg, type) {
  box.style.display = 'block';
  box.className = 'result-flash ' + (type==='ok'?'rf-ok':'rf-err');
  box.innerHTML = msg;
  setTimeout(() => box.style.display='none', 3500);
}

// ── Table ─────────────────────────────────────
let searchTimer;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = document.getElementById('tbl-search').value.trim();
    currentPage = 1;
    loadTable();
  }, 300);
}

async function loadTable() {
  const params = new URLSearchParams({
    page: currentPage, limit: PER_PAGE,
    q: searchQ, month: filterMonth,
  });
  const r = await fetch('/api/transactions?' + params);
  const d = await r.json();

  const total = d.total;
  const pages = Math.ceil(total/PER_PAGE) || 1;
  document.getElementById('tbl-count').textContent = total + ' รายการ';
  document.getElementById('pg-info').textContent = `หน้า ${currentPage}/${pages} (${total} รายการ)`;
  document.getElementById('pg-prev').disabled = currentPage === 1;
  document.getElementById('pg-next').disabled = currentPage >= pages;

  const tbody = document.getElementById('tbl-body');
  if (!d.items.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">ยังไม่มีรายการ</td></tr>';
    return;
  }

  tbody.innerHTML = d.items.map(t => {
    const mLabel = METHOD[t.method] || t.method;
    const discColor = t.discount > 0 ? 'var(--red)' : 'var(--muted)';
    return `<tr>
      <td style="white-space:nowrap;color:var(--muted);font-size:10px">${t.created_at}</td>
      <td style="font-weight:600;color:var(--cyan)">@${t.customer}</td>
      <td style="font-size:11px">${t.product_name}</td>
      <td style="color:var(--muted)">${t.list_price.toLocaleString()}</td>
      <td>
        <span id="price-txt-${t.id}" style="color:var(--green);font-weight:700">${t.actual_price.toLocaleString()} ฿</span>
        <input class="edit-inp" id="price-inp-${t.id}" value="${t.actual_price}" style="display:none"
          onblur="savePrice(${t.id})" onkeydown="if(event.key==='Enter')savePrice(${t.id})"/>
        <button onclick="editPrice(${t.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;margin-left:4px" title="แก้ราคา">✏️</button>
      </td>
      <td style="color:${discColor};font-size:11px">${t.discount > 0 ? '-'+t.discount.toLocaleString() : '—'}</td>
      <td style="font-size:11px;color:var(--muted)">${mLabel}</td>
      <td style="font-size:11px;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.note}">${t.note||'—'}</td>
      <td>
        <button onclick="deleteTx(${t.id})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:2px 6px" title="ลบ">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function editPrice(id) {
  document.getElementById('price-txt-'+id).style.display = 'none';
  document.getElementById('price-inp-'+id).style.display = 'inline-block';
  document.getElementById('price-inp-'+id).focus();
}

async function savePrice(id) {
  const inp = document.getElementById('price-inp-'+id);
  const price = parseInt(inp.value) || 0;
  await fetch('/api/transactions/'+id, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ actual_price: price })
  });
  await loadTable();
  await loadDashboard();
}

async function deleteTx(id) {
  if (!confirm('ลบรายการนี้?')) return;
  await fetch('/api/transactions/'+id, { method:'DELETE' });
  await loadTable();
  await loadDashboard();
}

function prevPage() { if(currentPage>1){currentPage--;loadTable();} }
function nextPage() { currentPage++;loadTable(); }

// ── Dashboard ──────────────────────────────────
async function loadDashboard() {
  const r = await fetch('/api/dashboard');
  const d = await r.json();

  document.getElementById('s-today-rev').textContent  = d.today_rev.toLocaleString() + ' ฿';
  document.getElementById('s-today-cnt').textContent  = d.today_count + ' รายการ';
  document.getElementById('s-month-rev').textContent  = d.month_rev.toLocaleString() + ' ฿';
  document.getElementById('s-month-cnt').textContent  = d.month_count + ' รายการ';
  document.getElementById('s-total-rev').textContent  = d.total_rev.toLocaleString() + ' ฿';
  document.getElementById('s-total-cnt').textContent  = d.total_count + ' รายการ';
  document.getElementById('s-discount').textContent   = d.total_discount.toLocaleString() + ' ฿';

  renderLineChart(d.daily);
  renderDonutChart(d.products);
}

function renderLineChart(daily) {
  const labels = daily.map(d => d.date.slice(5));
  const data   = daily.map(d => d.rev);
  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart'), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'รายได้ (฿)', data,
        borderColor:'#8b5cf6', backgroundColor:'rgba(139,92,246,.08)',
        fill:true, tension:.4, pointRadius:2, pointHoverRadius:5,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(30,30,53,.7)'},ticks:{maxRotation:0,maxTicksLimit:10}},
        y:{grid:{color:'rgba(30,30,53,.7)'},beginAtZero:true,
           ticks:{callback:v=>v.toLocaleString()+'฿'}},
      }
    }
  });
}

function renderDonutChart(prods) {
  const labels = prods.map(p => p.name);
  const data   = prods.map(p => p.revenue);
  const colors = ['rgba(139,92,246,.8)','rgba(34,211,238,.8)','rgba(16,185,129,.8)',
                  'rgba(245,158,11,.8)','rgba(244,63,94,.8)','rgba(167,139,250,.8)'];
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart'), {
    type:'doughnut',
    data:{labels, datasets:[{data, backgroundColor:colors, borderColor:'#06060a', borderWidth:3, hoverOffset:4}]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'62%',
      plugins:{legend:{position:'bottom', labels:{boxWidth:8, padding:8, font:{size:9}}}}
    }
  });
}

// ── Export ────────────────────────────────────
function exportCSV() {
  const month = document.getElementById('monthPick').value;
  window.location.href = '/api/export/csv' + (month ? '?month='+month : '');
}

init();
</script>
